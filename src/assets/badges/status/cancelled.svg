<svg
  xmlns="http://www.w3.org/2000/svg"
  width="193"
  height="20"
  role="img"
  aria-label="Cloudflare Workers: cancelled"
>
  <title>Cloudflare Workers: cancelled</title>
  <filter id="blur">
    <feGaussianBlur in="SourceGraphic" stdDeviation="16" />
  </filter>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1" />
    <stop offset="1" stop-opacity=".1" />
  </linearGradient>
  <clipPath id="r">
    <rect width="193" height="20" rx="3" fill="#fff" />
  </clipPath>
  <g clip-path="url(#r)">
    <rect width="132" height="20" fill="#555" />
    <rect x="132" width="61" height="20" fill="#dd4343" />
    <rect width="193" height="20" fill="url(#s)" />
  </g>
  <g
    fill="#fff"
    text-anchor="middle"
    font-family="Verdana,Geneva,DejaVu Sans,sans-serif"
    text-rendering="geometricPrecision"
    font-size="110"
  >
    <image
      x="5"
      y="3"
      width="14"
      height="14"
      href="data:image/svg+xml;base64,"
    />
    <text
      aria-hidden="true"
      x="755"
      y="150"
      fill="#010101"
      fill-opacity=".80"
      filter="url(#blur)"
      transform="scale(.1)"
      textLength="1050"
    >
      Cloudflare Workers
    </text>
    <text
      aria-hidden="true"
      x="755"
      y="150"
      fill="#010101"
      fill-opacity=".3"
      transform="scale(.1)"
      textLength="1050"
    >
      Cloudflare Workers
    </text>
    <text x="755" y="140" transform="scale(.1)" fill="#fff" textLength="1050">
      Cloudflare Workers
    </text>
    <text
      aria-hidden="true"
      x="1615"
      y="150"
      fill="#010101"
      fill-opacity=".80"
      filter="url(#blur)"
      transform="scale(.1)"
      textLength="510"
    >
      cancelled
    </text>
    <text
      aria-hidden="true"
      x="1615"
      y="150"
      fill="#010101"
      fill-opacity=".3"
      transform="scale(.1)"
      textLength="510"
    >
      cancelled
    </text>
    <text x="1615" y="140" transform="scale(.1)" fill="#fff" textLength="510">
      cancelled
    </text>
  </g>
</svg>
